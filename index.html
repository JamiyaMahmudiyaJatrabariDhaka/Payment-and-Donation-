<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডোনেশন পেজ - হাজী ওমর আলী কমপ্লেক্স</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background-color: #1e293b;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .status-badge {
            display: inline-block;
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 14px;
            margin-bottom: 30px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .payment-box {
            background-color: #0f172a;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            text-align: left;
        }
        .method-label {
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }
        .bkash-dot { background-color: #e2136e; }
        .nagad-dot { background-color: #f7941d; }

        .number-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: transparent;
            border: 1px dashed #334155;
            padding: 10px 15px;
            border-radius: 10px;
        }
        .number-text {
            font-size: 20px;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .copy-btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .copy-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">হাজী ওমর আলী কমপ্লেক্স</div>
    <div class="status-badge">✓ নিরাপদ পেমেন্ট সিস্টেম</div>

    <div class="payment-box">
        <div class="method-label">
            <span class="dot bkash-dot"></span> বিকাশ (পার্সোনাল)
        </div>
        <div class="number-container">
            <span class="number-text" id="bkashNum">01719012015</span>
            <button class="copy-btn" onclick="copyNumber('bkashNum')">কপি</button>
        </div>
    </div>

    <div class="payment-box">
        <div class="method-label">
            <span class="dot nagad-dot"></span> নগদ (পার্সোনাল)
        </div>
        <div class="number-container">
            <span class="number-text" id="nagadNum">01719012015</span>
            <button class="copy-btn" onclick="copyNumber('nagadNum')">কপি</button>
        </div>
    </div>
</div>

<script>
    function copyNumber(id) {
        const number = document.getElementById(id).innerText;
        navigator.clipboard.writeText(number).then(() => {
            alert("নাম্বারটি কপি হয়েছে: " + number);
        });
    }
</script>

</body>
</html>
